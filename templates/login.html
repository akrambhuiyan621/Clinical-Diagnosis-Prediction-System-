<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Clinical Diagnosis System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2 class="text-center">Login</h2>

    <form method="POST" autocomplete="off">
        <input name="username" id="login_username" class="form-control mt-3" 
               placeholder="Username" autocomplete="new-password" required>
        
        <input name="password" id="login_password" type="password" class="form-control mt-3" 
               placeholder="Password" autocomplete="new-password" required>
        
        <button class="btn btn-success mt-3 w-100">Login</button>
    </form>

    <p class="text-center mt-3">
        Don't have account? <a href="/register">Register</a>
    </p>

</body>
</html>
