<!DOCTYPE html>
<html>
<head>
    <title>Clinical Diagnosis System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f4f8; } 
        .admin-container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            margin-top: 50px; 
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1); 
        }
        .table thead { background-color: #0d6efd; color: white; }
        
        /* বাটন এবং ব্যাজের সাইজ একদম সমান রাখার জন্য */
        .action-btn {
            min-width: 100px; /* নির্দিষ্ট প্রস্থ */
            height: 35px;    /* নির্দিষ্ট উচ্চতা */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <div class="container admin-container">
        <h2 class="text-center mb-4" style="color: #0d6efd;">User Maintenance Panel</h2>
        
        <table class="table table-hover table-bordered text-center">
            <thead>
                <tr>
                    <th>Serial No</th> <th>User Name</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ loop.index }}</td> 
                    <td>{{ user[1] }}</td>
                    <td>{{ user[2] }}</td>
                    <td>
                        {% if user[1] != 'admin' %}
                        <a href="/admin/delete/{{ user[0] }}" 
                           class="btn btn-danger btn-sm action-btn" 
                           onclick="return confirm('Are you sure you want to remove this user?')">
                           Remove
                        </a>
                        {% else %}
                        <span class="badge bg-success action-btn">Admin</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="text-center mt-4">
            <a href="/" class="btn btn-secondary">Back to Prediction Page</a>
        </div>
    </div>
</body>
</html>
