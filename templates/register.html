<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Clinical Diagnosis System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2 class="text-center">Register</h2>

    <form method="POST" autocomplete="off">
        
        <input name="username" id="reg_username" class="form-control mt-3" 
               placeholder="Username" autocomplete="new-password" required>
        
        <input name="email" id="reg_email" type="email" class="form-control mt-3" 
               placeholder="Email" autocomplete="new-password" required>
        
        <input name="password" id="reg_password" type="password" class="form-control mt-3" 
               placeholder="Password" autocomplete="new-password" required>
        
        <button class="btn btn-success mt-3 w-100">Register</button>
    </form>

    <p class="text-center mt-3">
        Already have account? <a href="/login">Login</a>
    </p>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
